<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./second_contract.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100&display=swap" rel="stylesheet">
    <title>Image and Text Container</title>
</head>

<body>
    <div class="container">
        <div class="image">
            <img src="https://s3.amazonaws.com/sneakersocietyimages/assets/ss_logo.png" alt="Top Image"
                class="top-image" width="300">
        </div>
        <div class="text">
            <h1>Welcome to the Society</h1>
            <p>Our goal is to build a thriving community of sneaker enthusiasts by empowering them to promote their
                brand and
                efficiently run their business.</p>
        </div>
        <img src="../emails/assets/pexels-madvortex-9214280 2.png" alt="Bottom Image" class="bottom-image">
        <div class="footer">
            <h2>Get Ready!</h2>
            <p>Stay tuned for more exciting updates and information to come!</p>
            <div class="social">
                <i class="fa fa-brands fa-instagram"></i>
                <i class="fa fa-brands fa-facebook-f"></i>
                <i class="fa fa-brands fa-twitter"></i>
            </div>
        </div>
    </div>
</body>

</html>
