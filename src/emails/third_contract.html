<!DOCTYPE html>
<html>

<head>
    <link rel="stylesheet" href="./third._contract.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/4.7.0/css/font-awesome.min.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100&display=swap" rel="stylesheet">
    <title>Image and Text Container</title>
</head>

<body>
    <div class="container">
        <div class="image">
            <img src="https://s3.amazonaws.com/sneakersocietyimages/assets/ss_logo.png" alt="Top Image"
                class="top-image" width="300">
        </div>
        <img src="../emails/assets/whiteShoes.png" alt="Bottom Image" class="bottom-image">
        <div class="footer">
            <div class="innerFooter">
                <div class="box">
                    <h2>500+</h2>
                    <p>5 star reviews</p>
                </div>
                <div class="box">
                    <h2>100%</h2>
                    <p>Satisfaction rating</p>
                </div>
                <div class="box">
                    <h2>47</h2>
                    <p>Different shoe options</p>
                </div>
            </div>
            <div class="social">
                <i class="fa fa-brands fa-instagram"></i>
                <i class="fa fa-brands fa-facebook-f"></i>
                <i class="fa fa-brands fa-twitter"></i>
            </div>
        </div>
    </div>
</body>

</html>
